services:
  - type: web
    name: magicpin-ai-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TEAM_NAME
        value: Magicpin Challenge
      - key: CONTACT_EMAIL
        value: example@email.com
      - key: MODEL_NAME
        value: Context Aware Merchant AI
      - key: APP_VERSION
        value: "1.0"
      - key: LOG_LEVEL
        value: INFO
